spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${services.auth-service.uri:http://localhost:8083}
          predicates:
            - Path=/api/v1/auth/**,/auth-docs.html
        - id: room-service
          uri: ${services.room-service.uri:http://localhost:8080}
          predicates:
            - Path=/api/v1/rooms/**,/api-docs.html,/v3/api-docs/**
        - id: sync-service-http
          uri: ${services.sync-service.http-uri:http://localhost:8081}
          predicates:
            - Path=/api/ws-sync/**
        - id: sync-service-websocket
          uri: ${services.sync-service.ws-uri:ws://localhost:8081}
          predicates:
            - Path=/api/ws-sync/**
            - Header=Upgrade, WebSocket
        - id: media-service
          uri: ${services.media-service.uri:http://localhost:8084}
          predicates:
            - Path=/api/v1/media/**,/media-docs.html

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health, gateway

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:c3VwZXItc2VjdXJlLWRldi1zaWduaW5nLWtleS1mb3ItbmlnaHRzd2F0Y2gtYXV0aA==}

gateway:
  public-paths: /api/v1/auth/,/actuator/,/v3/api-docs,/auth-docs.html,/api-docs.html,/media-docs.html
