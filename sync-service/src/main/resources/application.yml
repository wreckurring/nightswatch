spring:
  application:
    name: sync-service
  webflux:
    base-path: /api

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.nightswatch.syncservice: DEBUG

sync-service:
  broker:
    type: simple
    relay-host: localhost
    relay-port: 61613
    relay-login: guest
    relay-password: guest
