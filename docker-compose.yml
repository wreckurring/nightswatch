services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-c3VwZXItc2VjdXJlLWRldi1zaWduaW5nLWtleS1mb3ItbmlnaHRzd2F0Y2gtYXV0aA==}
    depends_on:
      postgres:
        condition: service_healthy

  room-service:
    build:
      context: ./room-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/roomdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sync-service:
    build:
      context: ./sync-service
    ports:
      - "8081:8081"
    environment:
      SERVICES_ROOM-SERVICE_URI: http://room-service:8080
    depends_on:
      - room-service

  media-service:
    build:
      context: ./media-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mediadb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8082:8082"
    environment:
      SERVICES_AUTH-SERVICE_URI: http://auth-service:8083
      SERVICES_ROOM-SERVICE_URI: http://room-service:8080
      SERVICES_SYNC-SERVICE_HTTP-URI: http://sync-service:8081
      SERVICES_SYNC-SERVICE_WS-URI: ws://sync-service:8081
      SERVICES_MEDIA-SERVICE_URI: http://media-service:8084
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-c3VwZXItc2VjdXJlLWRldi1zaWduaW5nLWtleS1mb3ItbmlnaHRzd2F0Y2gtYXV0aA==}
    depends_on:
      - auth-service
      - room-service
      - sync-service
      - media-service

  nginx:
    build:
      context: ./nightswatch-client
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api-gateway
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data:
